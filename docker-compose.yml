version: "3.8"


services:

  db:
    image: postgres:16
    container_name: asset_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: assets

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data



  api:

    build: .

    container_name: asset_api

    depends_on:
      - db

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/assets

    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app


volumes:

  postgres_data: